<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>{{DECK_TITLE}}</title>

<!-- 코드 구문 강조: highlight.js (코드 슬라이드가 없으면 이 3줄은 삭제해도 됨) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlightjs-line-numbers.js/2.8.0/highlightjs-line-numbers.min.js"></script>

<style>
  /* ===== 리셋 & 전역 ===== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    font-family: -apple-system, "Segoe UI", "Noto Sans KR", sans-serif;
    background: #0b0d12;          /* 레터박스(여백) 색 */
    overflow: hidden;
  }

  /* ===== 데크: 화면 전체 점유 ===== */
  .deck {
    position: fixed;
    inset: 0;
    height: 100vh;                /* 폴백: 구형 브라우저 */
    height: 100dvh;             /* 모던: 모바일 주소창 대응 */
    overflow: hidden;
  }

  /* ===== 스테이지: 1280x720 고정 캔버스 (transform:scale로 fit) ===== */
  .stage {
    position: absolute;
    top: 50%; left: 50%;
    width: 1280px;
    height: 720px;
    transform-origin: center center;
    transform: translate(-50%, -50%) scale(1);  /* JS가 scale 값 갱신 */
  }

  /* ===== 슬라이드: 모두 겹쳐두고 .active만 노출 ===== */
  .slide {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    padding: 80px;
    text-align: center;
    color: #f4f6fb;
    opacity: 0;
    visibility: hidden;
    transition: opacity .5s ease, transform .5s ease, visibility 0s .5s;
    will-change: opacity, transform;
    z-index: 1;
  }
  .slide.active {
    opacity: 1;
    visibility: visible;
    transform: translateX(0) translateY(0) scale(1) !important;
    transition: opacity .5s ease, transform .5s ease, visibility 0s 0s;
    z-index: 3;
  }
  .slide.leaving { z-index: 2; }

  /* ===== 전환 효과 (data-anim 속성으로 선택: fade | slide | zoom) ===== */
  .slide[data-anim="slide"]         { transform: translateX(100%); }
  .slide[data-anim="slide"].leaving { transform: translateX(-100%); opacity: 1; }
  .slide[data-anim="zoom"]          { transform: scale(.82); }
  .slide[data-anim="zoom"].leaving  { transform: scale(1.18); opacity: 0; }
  /* fade는 기본값(transform 변화 없음) */

  /* ===== 슬라이드 비주얼 ===== */
  .slide h1 { font-size: clamp(48px, 5vw, 76px); margin-bottom: 24px; letter-spacing: -1px; }
  .slide h2 { font-size: 56px; margin-bottom: 36px; color: #8ab4ff; }
  .slide p  { font-size: 30px; line-height: 1.6; color: #c7cede; }
  .slide ul { list-style: none; font-size: 32px; line-height: 2.1; text-align: left; }
  .slide li::before { content: "▸ "; color: #8ab4ff; }
  .big { font-size: clamp(64px, 8vw, 120px); font-weight: 800; color: #8ab4ff; }

  /* 슬라이드 배경 팔레트 (원하는 슬라이드에 클래스로 부여) */
  .bg-blue   { background: radial-gradient(circle at 30% 20%, #1f3a93, #0b0d12 70%); }
  .bg-purple { background: radial-gradient(circle at 70% 30%, #2d1b5e, #0b0d12 70%); }
  .bg-green  { background: radial-gradient(circle at 50% 80%, #0f5132, #0b0d12 70%); }
  .bg-red    { background: radial-gradient(circle at 25% 75%, #7a2f3a, #0b0d12 70%); }
  .bg-teal   { background: radial-gradient(circle at 75% 25%, #1a5a6b, #0b0d12 70%); }

  /* ===== 콘텐츠 빌드(fragment) 효과: Space로 순차 등장 ===== */
  .fragment {
    opacity: 0;
    transform: translateY(16px);
    transition: opacity .4s ease, transform .4s ease;
    transition-delay: calc(var(--i, 0) * 60ms);  /* 스태거 */
  }
  .fragment.visible { opacity: 1; transform: none; }

  /* ===== 코드 블록 (highlight.js + line-numbers 플러그인) ===== */
  .code-block { max-width: 860px; width: 100%; border-radius: 12px; overflow: hidden; text-align: left; }
  .code-block code.hljs {
    display: block; padding: 22px 20px;
    font: 22px/1.35 "SF Mono", "Cascadia Code", Consolas, monospace; border-radius: 12px;
  }
  .hljs-ln { border-collapse: collapse; }
  .hljs-ln td { padding: 0; line-height: 1.35; border: 0; vertical-align: top; }
  .hljs-ln-numbers { text-align: right; padding-right: 16px !important; color: #5a6478; user-select: none; white-space: nowrap; width: 1px; }
  .hljs-ln-code { padding-left: 4px !important; }
  .hljs-ln tr { transition: background .3s ease, opacity .3s ease; }
  .hljs-ln tr.code-hl { background: rgba(255, 210, 0, .15); box-shadow: inset 3px 0 0 #ffd200; }
  .code-block.has-hl .hljs-ln tr:not(.code-hl) { opacity: .4; }

  /* ===== 진행바 · 슬라이드 번호 · 안내 ===== */
  .progress { position: fixed; top: 0; left: 0; width: 100%; height: 5px; background: rgba(255,255,255,.08); z-index: 100; }
  .progress__bar {
    height: 100%; width: 100%; background: linear-gradient(90deg, #8ab4ff, #6c7cff);
    transform: scaleX(0); transform-origin: left; transition: transform .35s ease;
  }
  .counter { position: fixed; bottom: 18px; right: 24px; z-index: 100; font-size: 16px; color: #8b93a7; letter-spacing: 1px; }
  .hint { position: fixed; bottom: 18px; left: 24px; z-index: 100; font-size: 13px; color: #5a6478; }

  /* ===== 접근성: 모션 최소화 ===== */
  @media (prefers-reduced-motion: reduce) {
    .slide, .fragment, .progress__bar, .hljs-ln tr { transition: none !important; }
  }
</style>
</head>
<body>
  <div class="progress"><div class="progress__bar" id="bar"></div></div>

  <main class="deck" aria-roledescription="presentation">
    <div class="stage">

      <!-- ▼▼▼ 여기부터 슬라이드 콘텐츠. <section class="slide ..."> 단위로 추가/수정 ▼▼▼ -->

      <!-- 슬라이드 1: 타이틀 -->
      <section class="slide bg-blue active" data-anim="fade" aria-label="슬라이드 1">
        <div>
          <h1>{{TITLE}}</h1>
          <p class="fragment">{{SUBTITLE}}</p>
        </div>
      </section>

      <!-- 슬라이드 2: 불릿 목록 (Space로 한 줄씩 등장) -->
      <section class="slide bg-purple" data-anim="slide" aria-label="슬라이드 2">
        <div>
          <h2>{{SECTION_TITLE}}</h2>
          <ul>
            <li class="fragment" style="--i:0">{{POINT_1}}</li>
            <li class="fragment" style="--i:1">{{POINT_2}}</li>
            <li class="fragment" style="--i:2">{{POINT_3}}</li>
          </ul>
        </div>
      </section>

      <!-- 슬라이드 3: 코드 (data-line-numbers="1|2,3|5" = Space로 단계별 줄 강조) -->
      <section class="slide bg-green" data-anim="zoom" aria-label="슬라이드 3">
        <div>
          <h2>{{CODE_TITLE}}</h2>
          <pre class="code-block" data-line-numbers="1|2,3"><code class="language-javascript">{{CODE_LINE_1}}
{{CODE_LINE_2}}
{{CODE_LINE_3}}</code></pre>
        </div>
      </section>

      <!-- 슬라이드 4: 마무리 -->
      <section class="slide bg-blue" data-anim="fade" aria-label="슬라이드 4">
        <div>
          <h1>{{CLOSING}}</h1>
        </div>
      </section>

      <!-- ▲▲▲ 슬라이드 끝 ▲▲▲ -->

    </div>
  </main>

  <div class="counter"><span id="cur">1</span> / <span id="total">0</span></div>
  <div class="hint">← → 슬라이드 · Space 컨텐츠 · F 전체화면</div>

<script>
  // ===== 상태 (단일 진실 공급원) =====
  const slides = Array.from(document.querySelectorAll('.slide'));
  const stepState = slides.map(() => 0);   // 슬라이드별 현재 빌드 단계
  let current = 0;
  let isAnimating = false;

  const bar = document.getElementById('bar');
  const curEl = document.getElementById('cur');
  document.getElementById('total').textContent = slides.length;

  // ===== 16:9 스테이지 fit (transform:scale, 잘림 없는 letterbox) =====
  const BASE_W = 1280, BASE_H = 720;
  let rafId = null;
  function fitStage() {
    const scale = Math.min(innerWidth / BASE_W, innerHeight / BASE_H);
    document.querySelector('.stage').style.transform = `translate(-50%, -50%) scale(${scale})`;
  }
  addEventListener('resize', () => { if (rafId) cancelAnimationFrame(rafId); rafId = requestAnimationFrame(fitStage); });
  fitStage();

  // ===== 코드 구문 강조 (highlight.js) =====
  if (window.hljs) {
    document.querySelectorAll('.code-block code').forEach((code) => {
      hljs.highlightElement(code);
      if (hljs.lineNumbersBlock) hljs.lineNumbersBlock(code);
    });
  }

  // ===== 빌드(fragment + 코드 줄 강조) 제어 =====
  function parseLines(spec) {
    const set = new Set();
    (spec || '').split(',').forEach((part) => {
      const [a, b] = part.split('-').map(Number);
      if (Number.isNaN(a)) return;
      for (let n = a; n <= (b ?? a); n++) set.add(n);
    });
    return set;
  }
  function maxStep(slide) {
    const frags = [...slide.querySelectorAll('.fragment')];
    const fragMax = frags.reduce((m, el, i) => Math.max(m, el.dataset.step ? Number(el.dataset.step) : i + 1), 0);
    const pre = slide.querySelector('.code-block');
    const codeMax = pre && pre.dataset.lineNumbers ? pre.dataset.lineNumbers.split('|').length : 0;
    return Math.max(fragMax, codeMax);
  }
  function applyStep(slide, step) {
    slide.querySelectorAll('.fragment').forEach((el, i) => {
      const idx = el.dataset.step ? Number(el.dataset.step) : i + 1;
      el.classList.toggle('visible', idx <= step);
    });
    const pre = slide.querySelector('.code-block');
    if (pre && pre.dataset.lineNumbers) {
      const groups = pre.dataset.lineNumbers.split('|');
      const active = step > 0 ? parseLines(groups[Math.min(step - 1, groups.length - 1)]) : new Set();
      pre.classList.toggle('has-hl', active.size > 0);
      pre.querySelectorAll('.hljs-ln-code').forEach((td) => {
        td.closest('tr').classList.toggle('code-hl', active.has(Number(td.dataset.lineNumber)));
      });
    }
  }

  // ===== 진행바 & 슬라이드 번호 =====
  function updateProgress() {
    const ratio = slides.length > 1 ? current / (slides.length - 1) : 1;
    bar.style.transform = `scaleX(${ratio})`;
    curEl.textContent = current + 1;
  }

  // ===== URL hash 동기화 (deep link / 새로고침 진입) =====
  function syncHash() { history.replaceState({ slide: current }, '', `#slide-${current + 1}`); }
  function parseHash() {
    const m = location.hash.match(/^#slide-(\d+)$/);
    if (!m) return 0;
    return Math.max(0, Math.min(Number(m[1]) - 1, slides.length - 1));
  }

  // ===== 슬라이드 전환 (방향키 / 스와이프 / hash) =====
  function goTo(index, dir = 'forward') {
    const next = Math.max(0, Math.min(index, slides.length - 1));
    if (next === current || isAnimating) return;
    isAnimating = true;
    const from = slides[current], to = slides[next];
    from.classList.add('leaving'); from.classList.remove('active');
    to.classList.add('active');
    const cleanup = () => { from.classList.remove('leaving'); isAnimating = false; from.removeEventListener('transitionend', onEnd); };
    const onEnd = (e) => { if (e.propertyName === 'transform' || e.propertyName === 'opacity') cleanup(); };
    from.addEventListener('transitionend', onEnd);
    setTimeout(cleanup, 800);   // transitionend 누락 대비 폴백
    current = next;
    stepState[next] = dir === 'backward' ? maxStep(to) : 0;
    applyStep(to, stepState[next]);
    syncHash(); updateProgress();
  }

  // ===== 컨텐츠 빌드 (Space / Shift+Space) =====
  // Space: 남은 단계가 있으면 한 단계 진행, 모두 끝났거나(또는 단계가 없으면) 다음 슬라이드로.
  function revealNext() {
    const s = slides[current];
    if (stepState[current] < maxStep(s)) { stepState[current]++; applyStep(s, stepState[current]); }
    else { goTo(current + 1, 'forward'); }   // 단계 소진 → 마지막에 →를 누르지 않아도 다음 슬라이드
  }
  function revealPrev() { const s = slides[current]; if (stepState[current] > 0) { stepState[current]--; applyStep(s, stepState[current]); } }

  // ===== 전체화면 토글 (F) =====
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen?.().catch(() => {});
    } else {
      document.exitFullscreen?.();
    }
  }

  // ===== 키보드 =====
  addEventListener('keydown', (e) => {
    const tag = document.activeElement.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || e.isComposing) return;
    if (e.ctrlKey || e.altKey || e.metaKey) return;
    switch (e.key) {
      case 'ArrowRight': goTo(current + 1, 'forward');  e.preventDefault(); break;
      case 'ArrowLeft':  goTo(current - 1, 'backward'); e.preventDefault(); break;
      case ' ': e.shiftKey ? revealPrev() : revealNext(); e.preventDefault(); break;
      case 'PageDown': goTo(current + 1, 'forward');  e.preventDefault(); break;
      case 'PageUp':   goTo(current - 1, 'backward'); e.preventDefault(); break;
      case 'Home': goTo(0, 'backward'); e.preventDefault(); break;
      case 'End':  goTo(slides.length - 1, 'forward'); e.preventDefault(); break;
      default:
        if (e.key.toLowerCase() === 'f') { toggleFullscreen(); e.preventDefault(); }  // F: 전체화면
    }
  });

  // ===== 터치 스와이프 (슬라이드 이동) =====
  let tsX = 0, tsY = 0; const SWIPE = 50;
  addEventListener('touchstart', (e) => { tsX = e.changedTouches[0].clientX; tsY = e.changedTouches[0].clientY; }, { passive: true });
  addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - tsX, dy = e.changedTouches[0].clientY - tsY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > SWIPE) dx < 0 ? goTo(current + 1, 'forward') : goTo(current - 1, 'backward');
  }, { passive: true });

  // ===== hash 변경(뒤로가기 등) =====
  addEventListener('hashchange', () => { const idx = parseHash(); if (idx !== current) goTo(idx, idx > current ? 'forward' : 'backward'); });

  // ===== 초기화 =====
  (function init() {
    const idx = parseHash();
    slides.forEach((s) => s.classList.remove('active'));
    slides[idx].classList.add('active');
    current = idx;
    applyStep(slides[idx], 0);
    syncHash(); updateProgress();
  })();
</script>
</body>
</html>
